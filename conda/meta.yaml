{% set version = "0.1.0" %}

package:
  name: pycopdem
  version: {{ version }}

source:
  path: ..

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools >=61
    - wheel
  run:
    - python >=3.11
    - borevitz-lab
    - attrs
    - typing_extensions
    - numpy
    - rasterio
    - rioxarray
    - xarray
    - zarr
    - pysheds
    - affine

test:
  imports:
    - pycopdem
    - pycopdem.grid
    - pycopdem.derive

about:
  home: https://github.com/thestochasticman/pycopdem
  license: MIT
  license_file: LICENSE
  summary: Cached Copernicus 30 m DEM windows with on-read terrain derivatives
